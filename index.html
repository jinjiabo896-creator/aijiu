<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倪师艾灸 · 2026 智库版</title>
    <style>
        :root { --p: #1a3c34; --red: #a22d2d; --gold: #b89b5e; --bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 50px; }

        /* 顶部时钟 - 全动态 */
        header { background: #111; padding: 30px 20px; border-bottom: 2px solid var(--gold); text-align: center; }
        #dyn-year { font-size: 1.2rem; color: var(--gold); letter-spacing: 2px; }
        #dyn-clock { font-size: 3rem; font-weight: bold; margin: 10px 0; font-family: monospace; }
        .shichen-tag { background: var(--p); padding: 6px 20px; border-radius: 20px; font-size: 0.95rem; display: inline-block; }

        /* 实战卡片 */
        .card { background: #fdfaf2; color: #1a1a1a; margin: 20px 15px; border-radius: 12px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .p-name { font-size: 3.2rem; font-weight: bold; color: var(--red); text-align: center; margin: 0; }
        .p-meta { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        
        .guide-step { background: rgba(0,0,0,0.03); padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--p); line-height: 1.7; }
        .guide-step b { color: var(--p); display: block; margin-bottom: 5px; font-size: 1.1rem; }

        /* 计时器 */
        .timer-wrap { background: #1a1a1a; margin: 0 15px; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        #timer-display { font-size: 2.5rem; color: var(--gold); font-family: monospace; margin-bottom: 15px; }
        .timer-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 25px; border-radius: 5px; cursor: pointer; margin: 0 5px; }
        .timer-btn:active { background: var(--gold); color: #000; }

        /* 笔记区 */
        .note-area { padding: 25px 15px; }
        textarea { width: 100%; height: 100px; background: #111; border: 1px solid #444; border-radius: 10px; color: #fff; padding: 15px; box-sizing: border-box; font-size: 1rem; }
        .save-btn { background: var(--red); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; margin-top: 15px; }
        
        .log-item { background: #111; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #222; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div id="dyn-year">正在对齐星辰时间...</div>
        <div id="dyn-clock">00:00:00</div>
        <div class="shichen-tag" id="shichen-text">加载时辰中...</div>
    </header>

    <div class="card">
        <p style="margin:0; font-size: 0.8rem; color: #999; text-align: center;">倪海厦实战推荐：</p>
        <div class="p-name" id="p-name">--</div>
        <div class="p-meta" id="p-meridian">-- 经值班</div>

        <div class="guide-step">
            <b>第一步：定坐标</b>
            <span id="step-1">--</span>
        </div>
        <div class="guide-step">
            <b>第二步：量尺寸</b>
            <span id="step-2">--</span>
        </div>
        <div class="guide-step">
            <b>第三步：找体感</b>
            <span id="step-3">--</span>
        </div>

        <div style="font-size: 0.85rem; color: #444; line-height: 1.6;">
            <span style="color:var(--red); font-weight: bold;">倪师嘱托：</span>
            <span id="p-ni">--</span>
        </div>
    </div>

    <div class="timer-wrap">
        <div style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">建议艾灸时长</div>
        <div id="timer-display">15:00</div>
        <div class="timer-btns">
            <button class="timer-btn" onclick="startTimer()">开始计时</button>
            <button class="timer-btn" onclick="resetTimer()">重置</button>
        </div>
    </div>

    <div class="note-area">
        <h4 style="color:var(--gold); margin-top: 0;">记录今日艾灸反馈 (盘古辨证)</h4>
        <textarea id="feedback" placeholder="灸后感受：哪里热？是否有汗、红疹、热传导？"></textarea>
        <button class="save-btn" onclick="saveRecord()">生成倪师风格辨证医案</button>
        <div id="history"></div>
    </div>
</div>

<script>
    // 维度 ①：24小时全量时辰矩阵（修复 10:01 漂移问题）
    const SCHEDULE = [
        { h: [23, 0], s: "子", m: "胆经", p: "足临泣", n:["脚背外侧，第四/五趾骨间。","沿趾缝上推至两骨结合凹陷处。","按之极酸即是真穴。"], ni:"子时胆经最旺。倪师：‘子时应眠，灸此旨在引火下行’。" },
        { h: [1, 2], s: "丑", m: "肝经", p: "太冲", n:["脚背大脚趾与二脚趾间。","向上量约两横指宽，跖骨交汇凹陷处。","倪师：‘这是消气穴’，按之极痛。"], ni:"丑时肝经排毒。灸太冲疏肝理气，去肝毒最快。" },
        { h: [3, 4], s: "寅", m: "肺经", p: "列缺", n:["两手虎口自然交叉。","食指尖落下的手腕骨侧凹陷处。","摸到一个小缺口的感觉即是。"], ni:"寅时肺经当令。哮喘、咳嗽者，灸此穴宣肺平喘。" },
        { h: [5, 6], s: "卯", m: "大肠经", p: "曲池", n:["手肘弯曲成直角。","肘横纹外侧尽头的凹陷。","倪师：‘按之极酸处’，能清热解毒。"], ni:"卯时大肠经值班。灸曲池清热排毒，对皮肤瘙痒极佳。" },
        { h: [7, 8], s: "辰", m: "胃经", p: "足三里", n:["膝盖髌骨外侧凹陷（犊鼻）下。","四指并拢量三寸。","胫骨外一横指，按之有跳动感。"], ni:"辰时胃气最旺。灸三里如吃老母鸡，春季补中益气必灸。" },
        { h: [9, 10], s: "巳", m: "脾经", p: "三阴交", n:["内踝尖直上四指宽。","胫骨后缘靠近骨头处。","按之极酸。"], ni:"巳时脾经当值。此为调经、化湿、消肿圣穴。" },
        { h: [11, 12], s: "午", m: "心经", p: "关元", n:["肚脐眼正中心为起点。","正下方四指宽三量（三寸）。","人体正中线上。"], ni:"午时心经当令。灸关元引心火入小肠，温养丹田，续命之火。" },
        { h: [13, 14], s: "未", m: "小肠经", p: "阳谷", n:["手腕外侧（小指侧）。","尺骨茎突与三角骨间凹陷。","左右摆动手指能摸到骨缝。"], ni:"未时小肠分清泌浊。灸阳谷理气清热，调理吸收。" },
        { h: [15, 16], s: "申", m: "膀胱经", p: "昆仑", n:["外踝尖与后方大筋连线中点。","按压有明显的深层酸痛感。","摸到凹陷处。"], ni:"申时膀胱经运行。倪师：‘这是治腰痛的特效药’。" },
        { h: [17, 18], s: "酉", m: "肾经", p: "太溪", n:["内踝尖与后方大筋连线中点。","按压有明显的搏动感。","此处为肾经原穴。"], ni:"酉时肾经当令。灸太溪滋阴补肾，引火归元。" },
        { h: [19, 20], s: "戌", m: "心包经", p: "内关", n:["腕横纹上二寸（三指宽）。","手臂中间两条大筋缝隙中。","按压会感觉到手掌发麻。"], ni:"戌时调理心包。灸内关宁心安神，改善睡眠。" },
        { h: [21, 22], s: "亥", m: "三焦经", p: "阳池", n:["手腕背面横纹中点。","指总伸肌腱尺侧凹陷中。","按之有一道深沟。"], ni:"亥时通达三焦。灸阳池调理全身气机，通经活络。" }
    ];

    function runEngine() {
        const now = new Date();
        const h = now.getHours();
        
        // 1. 动态对齐年月日（彻底废除 2024）
        document.getElementById('dyn-year').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
        document.getElementById('dyn-clock').innerText = now.toLocaleTimeString('zh-CN', { hour12: false });

        // 2. 动态季节逻辑
        const seasons = ["冬藏", "冬藏", "春生", "春生", "春生", "夏长", "夏长", "夏长", "秋收", "秋收", "秋收", "冬藏"];
        document.getElementById('dyn-year').innerText += ` · 时令：${seasons[now.getMonth()]}`;

        // 3. 动态精准时辰（修复 10:01 属于 [9,10] 巳时）
        const cur = SCHEDULE.find(x => h === x.h[0] || h === x.h[1]) || SCHEDULE[0];
        
        document.getElementById('shichen-text').innerText = `${cur.s}时 (${cur.h[0]}:00-${cur.h[1]}:59)`;
        document.getElementById('p-name').innerText = cur.p;
        document.getElementById('p-meridian').innerText = `${cur.m}当令 · 推荐灸之`;
        document.getElementById('step-1').innerText = cur.n[0];
        document.getElementById('step-2').innerText = cur.n[1];
        document.getElementById('step-3').innerText = cur.n[2];
        document.getElementById('p-ni').innerText = cur.ni;
    }

    // 艾灸计时器逻辑
    let tInt; let tLeft = 15 * 60;
    function startTimer() {
        clearInterval(tInt);
        tInt = setInterval(() => {
            if(tLeft <= 0) { clearInterval(tInt); alert("艾灸时间到，请务必避风封关！"); return; }
            tLeft--;
            const m = Math.floor(tLeft/60); const s = tLeft%60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }, 1000);
    }
    function resetTimer() { clearInterval(tInt); tLeft = 15 * 60; document.getElementById('timer-display').innerText = "15:00"; }

    function saveRecord() {
        const val = document.getElementById('feedback').value;
        if(!val) return;
        let res = val.includes("走") || val.includes("热") ? "【辨证】药气入经，真火引动元气。大吉。" : "【提示】气机感传中，观察明日是否排便通畅。";
        const log = document.createElement('div');
        log.className = 'log-item';
        log.innerHTML = `<small style="color:#666">${new Date().toLocaleString()}</small><br>${val}<br><b style="color:var(--gold)">${res}</b>`;
        document.getElementById('history').prepend(log);
        document.getElementById('feedback').value = "";
    }

    // 每一秒执行一次动态对齐
    setInterval(runEngine, 1000);
    runEngine();
</script>
</body>
</html>
