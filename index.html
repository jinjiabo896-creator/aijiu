<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenMoxa 8.0 · 倪师实战智库</title>
    <style>
        :root { --p: #1a3c34; --red: #a22d2d; --gold: #b89b5e; --paper: #f4f1ea; --ink: #1c1c1b; }
        body { background: var(--ink); color: #ccc; font-family: 'PingFang SC', 'STKaiti', serif; margin: 0; padding: 0; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 120px; }

        /* 顶部子午流注看板 */
        .clock-header { background: linear-gradient(135deg, #1a3c34, #0d1f1b); padding: 30px 20px; border-radius: 0 0 35px 35px; border-bottom: 3px solid var(--gold); position: relative; }
        .shichen-badge { position: absolute; right: 20px; top: 30px; background: var(--gold); color: #000; padding: 5px 12px; border-radius: 10px; font-weight: bold; font-size: 0.8rem; }
        .clock-header h2 { margin: 0; color: var(--gold); font-size: 1.5rem; letter-spacing: 2px; }

        /* 核心卡片 - 宣纸质感 */
        .card { background: var(--paper); background-image: radial-gradient(#dcd7c9 1px, transparent 1px); background-size: 20px 20px; color: #222; margin: -20px 15px 20px; border-radius: 25px; padding: 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); position: relative; }
        .seal { position: absolute; top: 20px; right: 20px; width: 60px; height: 60px; border: 2px solid var(--red); color: var(--red); display: flex; align-items: center; justify-content: center; transform: rotate(15deg); font-weight: bold; border-radius: 5px; opacity: 0.7; }
        
        .point-name { font-size: 2.8rem; font-weight: bold; text-align: center; color: var(--red); margin: 10px 0; }
        .visual-img { width: 100%; border-radius: 15px; margin: 15px 0; border: 1px solid #ccc; }

        /* 倪师秘传区 */
        .ni-secret { background: rgba(0,0,0,0.05); padding: 15px; border-radius: 12px; border-left: 5px solid var(--p); margin: 15px 0; }
        .ni-secret b { color: var(--p); display: block; margin-bottom: 5px; }

        /* 实时禁忌雷达 */
        .warning-radar { background: #fff1f0; border: 1px solid #ffa39e; color: #cf1322; padding: 12px; border-radius: 10px; margin: 0 15px 20px; font-size: 0.85rem; display: flex; gap: 10px; align-items: center; }

        /* 交互区 */
        .input-group { padding: 0 15px; }
        textarea { width: 100%; height: 90px; background: rgba(255,255,255,0.05); border: 1px solid var(--gold); border-radius: 15px; color: #fff; padding: 15px; font-family: inherit; font-size: 1rem; box-sizing: border-box; }
        .btn { background: var(--red); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; margin-top: 15px; box-shadow: 0 5px 20px rgba(162,45,45,0.4); }

        /* 历史报告 */
        #report-list { padding: 0 15px; margin-top: 30px; }
        .report-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <header class="clock-header">
        <div class="shichen-badge" id="shichen-name">辰时</div>
        <h2 id="meridian-name">胃经当令</h2>
        <div style="font-size: 0.8rem; opacity: 0.7; margin-top: 5px;">子午流注：此时艾灸，效力倍增</div>
    </header>

    <div class="card">
        <div class="seal">倪师<br>正统</div>
        <div class="point-name" id="p-name">足三里</div>
        
        <img id="p-img" class="visual-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Stomach_36.png/400px-Stomach_36.png" alt="穴位图">

        <div class="ni-secret">
            <b>倪师点穴诀：</b>
            <span id="p-guide">膝下三寸，胫骨外一横指。按之极酸，便是真穴。</span>
        </div>

        <div style="font-size: 0.9rem; line-height: 1.6;">
            <b>【隔物灸建议】</b>：<span id="p-addon">若觉脾胃虚寒，可用生姜切片垫底，灸之可透达胃经。</span>
        </div>
    </div>

    <!-- 禁忌雷达 -->
    <div class="warning-radar">
        <span style="font-size: 1.5rem;">⚠️</span>
        <div><b>今日避风警告：</b>艾灸后全身毛孔大开，2小时内严禁吹风、洗澡。注意覆盖脖颈后方“大椎穴”。</div>
    </div>

    <div class="input-group">
        <textarea id="feedback" placeholder="倪师问：灸后有什么体感？(如：热感往下走、出大汗、局部发痒...)"></textarea>
        <button class="btn" onclick="analyze()">提交反馈 · 盘古模型辨证</button>
    </div>

    <div id="report-list">
        <h4 style="color:var(--gold); border-bottom: 1px solid #444; padding-bottom: 10px;">修行医案记录</h4>
        <div id="history-box"></div>
    </div>
</div>

<script>
    // 维度 ①：子午流注逻辑库
    const CLOCK_DATA = [
        { s: "子", m: "胆经", t: "23:00-01:00", p: "足临泣", a: "此时应眠，不宜大灸。" },
        { s: "寅", m: "肺经", t: "03:00-05:00", p: "列缺", a: "调理肺气，肃降寒痰。" },
        { s: "卯", m: "大肠经", t: "05:00-07:00", p: "天枢", a: "通便排毒，理肠胃气。" },
        { s: "辰", m: "胃经", t: "07:00-09:00", p: "足三里", a: "强身健体，固后天之本。" },
        { s: "酉", m: "肾经", t: "17:00-19:00", p: "关元", a: "补肾壮阳，温养元气。" }
    ];

    // 维度 ②：针对不同穴位的倪师秘传
    const POINT_WISDOM = {
        "足三里": { img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Stomach_36.png/400px-Stomach_36.png", addon: "建议隔姜灸，生姜片上扎几个眼。倪师说：‘这叫借姜的辛味入经’。" },
        "天枢": { img: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Stomach_25.png/400px-Stomach_25.png", addon: "平躺位，灸热感应渗透进肠道。若听见肠鸣，代表药气已动。" },
        "关元": { img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Ren_4.png/400px-Ren_4.png", addon: "倪师常灸此穴至500壮。灸时观想命门火旺，此为续命之术。" }
    };

    function updateClock() {
        const hour = new Date().getHours();
        const shichenIdx = Math.floor((hour + 1) / 2) % 12;
        const shichens = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
        const cur = CLOCK_DATA.find(d => d.s === shichens[shichenIdx]) || CLOCK_DATA[3];

        document.getElementById('shichen-name').innerText = cur.s + "时 (" + cur.t + ")";
        document.getElementById('meridian-name').innerText = cur.m + "值班";
        
        // 自动更新推荐穴位
        const point = cur.p;
        document.getElementById('p-name').innerText = point;
        const wisdom = POINT_WISDOM[point] || POINT_WISDOM["足三里"];
        document.getElementById('p-img').src = wisdom.img;
        document.getElementById('p-addon').innerText = wisdom.addon;
    }

    function analyze() {
        const text = document.getElementById('feedback').value;
        if(!text) return alert("请记录你的真实感受");
        
        // 模拟华为盘古中医大模型推理 (NLP语义提取)
        let report = "";
        if(text.includes("热") && text.includes("走")) report = "【辨证】药气入经，引火归元。此为艾灸最高境界，说明经络已通，元气正在自我修复。";
        else if(text.includes("痒")) report = "【辨证】驱风之象。体内风邪较盛，艾火正在将风邪逼向体表。倪师云：‘痒是风在走’。";
        else if(text.includes("凉") || text.includes("风")) report = "【辨证】寒气外排。体内积寒太久，真阳进入后，逼迫陈寒溢出，属于典型的好转反应。";
        else report = "【状态】气机感传中。目前的刺激尚处于皮表，建议增加艾条质量，保持‘温而不燥’的状态。";

        const box = document.getElementById('history-box');
        const item = document.createElement('div');
        item.className = 'report-item';
        item.innerHTML = `<small>${new Date().toLocaleString()}</small><br><b>反馈：</b>${text}<br><span style="color:var(--gold)">${report}</span>`;
        box.prepend(item);
        
        document.getElementById('feedback').value = "";
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
    }

    updateClock();
</script>

</body>
</html>
