<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenMoxa 9.0 · 倪师精算智库</title>
    <style>
        :root { --p: #1a3c34; --red: #a22d2d; --gold: #b89b5e; --paper: #f4f1ea; }
        body { background: #0f1111; color: #ccc; font-family: 'PingFang SC', serif; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 100px; }

        /* 顶部子午流注 */
        header { background: var(--p); padding: 30px 20px; text-align: center; border-bottom: 3px solid var(--gold); border-radius: 0 0 35px 35px; }
        .time-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 15px; margin-top: 10px; }
        .cur-time { color: var(--gold); font-size: 1.5rem; font-weight: bold; }

        /* 核心卡片 */
        .card { background: var(--paper); color: #222; margin: 15px; border-radius: 25px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); position: relative; }
        .point-name { font-size: 2.8rem; font-weight: bold; text-align: center; color: var(--red); margin: 5px 0; }
        
        /* 穴位图容器 */
        .img-container { width: 100%; aspect-ratio: 4/3; background: #ddd; border-radius: 15px; margin: 15px 0; overflow: hidden; position: relative; border: 1px solid #ccc; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .img-error { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: #f0ede5; padding: 20px; text-align: center; font-size: 0.9rem; color: #a22d2d; }

        .guide-box { background: rgba(0,0,0,0.05); padding: 15px; border-radius: 12px; border-left: 5px solid var(--p); line-height: 1.6; }
        
        /* 交互区 */
        .input-area { padding: 0 15px; }
        textarea { width: 100%; height: 90px; background: #1e1e1e; border: 1px solid var(--gold); border-radius: 15px; color: #fff; padding: 15px; box-sizing: border-box; font-family: inherit; }
        .btn { background: var(--red); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; margin-top: 15px; }
        
        #history { padding: 0 15px; margin-top: 30px; }
        .log-item { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="font-size: 0.9rem; opacity: 0.8;">—— 倪师子午流注精算 ——</div>
        <div class="time-box">
            <div class="cur-time" id="shichen-name">--时</div>
            <div id="meridian-info" style="font-size: 0.9rem; color: #fff; margin-top: 5px;">加载经络中...</div>
        </div>
    </header>

    <div class="card">
        <div style="text-align: center; font-size: 0.8rem; color: #666;">今日推荐灸位</div>
        <div class="point-name" id="p-name">--</div>
        
        <div class="img-container">
            <!-- 使用 weserv 加速代理，确保 1 秒内响应 -->
            <img id="p-img" src="" onerror="handleImgError()">
            <div id="p-error" class="img-error">
                <b>【图谱加载失败】倪师口诀指引：</b><br>
                <span id="p-alt-guide"></span>
            </div>
        </div>

        <div class="guide-box">
            <b>倪师实战取穴秘籍：</b>
            <p id="p-guide" style="margin: 5px 0 0; font-size: 0.95rem;"></p>
        </div>
    </div>

    <div class="input-area">
        <h4 style="color:var(--gold); margin-bottom:10px;">记录艾灸感受 (盘古模型分析)</h4>
        <textarea id="feedback" placeholder="灸后有什么感觉？发热、出汗、还是局部有痛点？"></textarea>
        <button class="btn" onclick="runAnalysis()">获取倪师风格医案判断</button>
    </div>

    <div id="history"></div>
</div>

<script>
    // 维度 ①：全量 12 时辰精算逻辑
    const MOXA_SCHEDULE = [
        { start: 23, end: 1, s: "子", m: "胆经", p: "足临泣", g: "脚背外侧，第四、五趾骨结合部前方的凹陷处。", img: "https://upload.wikimedia.org/wikipedia/commons/b/bc/Gallbladder_41.png" },
        { start: 1, end: 3, s: "丑", m: "肝经", p: "太冲", g: "足背侧，第一、二跖骨结合部之前的凹陷中。", img: "https://upload.wikimedia.org/wikipedia/commons/3/30/Liver_3.png" },
        { start: 3, end: 5, s: "寅", m: "肺经", p: "列缺", g: "手腕横纹上1.5寸，两手虎口交叉，食指尖落下的凹陷处。", img: "https://upload.wikimedia.org/wikipedia/commons/5/58/Lung_7.png" },
        { start: 5, end: 7, s: "卯", m: "大肠经", p: "曲池", g: "屈肘成直角，肘横纹外侧端与肱骨外上髁连线中点。", img: "https://upload.wikimedia.org/wikipedia/commons/5/52/Large_Intestine_11.png" },
        { start: 7, end: 9, s: "辰", m: "胃经", p: "足三里", g: "膝盖下三寸（四指宽），胫骨外侧一横指处。", img: "https://upload.wikimedia.org/wikipedia/commons/c/c9/Stomach_36.png" },
        { start: 9, end: 11, s: "巳", m: "脾经", p: "三阴交", g: "内踝尖直上三寸（四指宽），胫骨后缘靠近骨边。", img: "https://upload.wikimedia.org/wikipedia/commons/e/ec/Spleen_6.png" },
        { start: 11, end: 13, s: "午", m: "心经", p: "关元", g: "倪师：午时心火旺，灸关元助心火下行入小肠。", img: "https://upload.wikimedia.org/wikipedia/commons/4/41/Ren_4.png" },
        { start: 13, end: 15, s: "未", m: "小肠经", p: "阳谷", g: "手腕外侧，尺骨茎突与三角骨之间的凹陷处。", img: "https://upload.wikimedia.org/wikipedia/commons/1/18/Small_Intestine_5.png" },
        { start: 15, end: 17, s: "申", m: "膀胱经", p: "昆仑", g: "外踝尖与跟腱之间的凹陷处。", img: "https://upload.wikimedia.org/wikipedia/commons/5/5c/Bladder_60.png" },
        { start: 17, end: 19, s: "酉", m: "肾经", p: "太溪", g: "内踝尖与跟腱之间的凹陷处。", img: "https://upload.wikimedia.org/wikipedia/commons/3/3d/Kidney_3.png" },
        { start: 19, end: 21, s: "戌", m: "心包经", p: "内关", g: "腕横纹上二寸（三指宽），两条大筋之间。", img: "https://upload.wikimedia.org/wikipedia/commons/3/36/Pericardium_6.png" },
        { start: 21, end: 23, s: "亥", m: "三焦经", p: "阳池", g: "腕背横纹中，指总伸肌腱尺侧边缘凹陷中。", img: "https://upload.wikimedia.org/wikipedia/commons/9/90/Triple_Burner_4.png" }
    ];

    function calculate() {
        const hour = new Date().getHours();
        // 查找当前时辰
        const cur = MOXA_SCHEDULE.find(d => {
            if (d.start === 23) return hour >= 23 || hour < 1;
            return hour >= d.start && hour < d.end;
        }) || MOXA_SCHEDULE[4]; // 找不到默认辰时

        document.getElementById('shichen-name').innerText = `${cur.s}时 (${cur.start}:00-${cur.end}:00)`;
        document.getElementById('meridian-info').innerText = `${cur.m}当令 · 推荐灸之`;
        document.getElementById('p-name').innerText = cur.p;
        document.getElementById('p-guide').innerText = cur.g;
        document.getElementById('p-alt-guide').innerText = cur.g;
        
        // 使用weserv加速代理加载图片
        const proxyPrefix = "https://images.weserv.nl/?url=";
        document.getElementById('p-img').src = proxyPrefix + cur.img.replace('https://', '');
    }

    function handleImgError() {
        document.getElementById('p-img').style.display = 'none';
        document.getElementById('p-error').style.display = 'flex';
    }

    function runAnalysis() {
        const text = document.getElementById('feedback').value;
        if(!text) return alert("请先录入感受");
        
        let result = "";
        if(text.includes("热") || text.includes("走")) result = "【倪师辨证】药气入经，真火导引元气。这是身体开启自我修复的好现象。";
        else if(text.includes("痒")) result = "【倪师辨证】驱风之兆。艾火逼迫体内风邪外排。倪师云：‘痒是风在走’。";
        else result = "【盘古模型分析】气机感传中。请继续保持 7 天记录，以形成完整的经络平衡报告。";

        const box = document.getElementById('history');
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerHTML = `<small>${new Date().toLocaleTimeString()}</small><br>${text}<br><span style="color:var(--gold)">${result}</span>`;
        box.prepend(item);
        document.getElementById('feedback').value = "";
    }

    calculate();
</script>
</body>
</html>
